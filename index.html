<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <title>Helen's Portfolio | QA & Developer</title>
    <style>
        :root {
            --primary-blue: #0056b3;
            --primary-green: #28a745;
            --bg-light: #f4f7f9;
            --text-main: #333;
            --border-color: #d1d9e0;
        }

        body { 
            margin: 0; padding: 0; background-color: var(--bg-light); 
            font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif; 
            line-height: 1.6; color: var(--text-main); 
        }

        /* Header 區塊 */
        .hero-section {
            background: #fff; padding: 60px 20px; text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }

        h1 { font-size: 32px; margin-bottom: 10px; color: #1a1a1a; }
        .subtitle { font-size: 18px; color: #666; margin-bottom: 30px; }

        /* 分類卡片網格 */
        .category-grid {
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 30px; 
            margin-top: 20px;
        }

        .category-card {
            background: #fff; border: 1px solid var(--border-color); border-radius: 16px;
            padding: 40px; text-decoration: none; color: inherit;
            transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center;
            text-align: center; position: relative;
        }

        /* 測試區塊 Hover 效果 */
        .qa-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 86, 179, 0.1);
            border-color: var(--primary-blue);
            border-bottom: 6px solid var(--primary-blue);
        }

        /* 開發區塊 Hover 效果 */
        .dev-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(40, 167, 69, 0.1);
            border-color: var(--primary-green);
            border-bottom: 6px solid var(--primary-green);
        }

        .category-card .icon { font-size: 50px; margin-bottom: 20px; }
        .category-card h2 { font-size: 24px; margin: 10px 0; color: #1a1a1a; }
        .category-card p { color: #666; font-size: 15px; margin-bottom: 25px; min-height: 72px; }

        /* 標籤雲 */
        .tags { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: auto; }
        .tag {
            font-size: 12px; font-weight: bold;
            padding: 4px 12px; border-radius: 20px; background: #eee; color: #555;
        }

        /* 響應式：手機版改為單欄 */
        @media (max-width: 768px) {
            .category-grid { grid-template-columns: 1fr; }
        }

        .footer { text-align: center; color: #999; font-size: 14px; margin-top: 80px; padding-bottom: 40px; }
    </style>
</head>
<body>

<div class="hero-section">
    <h1>技術專案錦集</h1>
  
    <div style="display: flex; justify-content: center; gap: 10px;">
        <span class="tag"># C# .NET</span>
        <span class="tag"># Playwright</span>
        <span class="tag"># AI</span>
    </div>
</div>

<div class="container">
    <div class="category-grid">
        
        <a href="qa-projects.html" class="category-card qa-card">
            <div class="icon">🔍</div>
            <h2>測試自動化 & 架構研發</h2>
            <p>SDD 測試框架搭建、AI 輔助腳本遷移技術，以及金流支付 E2E 自動化驗證流程。</p>
            <div class="tags">
                <span class="tag" style="background: #e7f3ff; color: #0056b3;">Playwright</span>
                <span class="tag" style="background: #e7f3ff; color: #0056b3;">Spec-Driven</span>
                <span class="tag" style="background: #e7f3ff; color: #0056b3;">CI/CD</span>
            </div>
        </a>

        <a href="dev-projects.html" class="category-card dev-card">
            <div class="icon">💻</div>
            <h2>後端開發 & 系統整合</h2>
            <p>BPM 表單開發、SAP 異質系統資料對接，以及 Legacy 系統重構現代化專案。</p>
            <div class="tags">
                <span class="tag" style="background: #e9f7ef; color: #28a745;">.NET Core</span>
                <span class="tag" style="background: #e9f7ef; color: #28a745;">SAP Adapter</span>
                <span class="tag" style="background: #e9f7ef; color: #28a745;">SQL Server</span>
            </div>
        </a>

    </div>
</div>

</body>
</html>
